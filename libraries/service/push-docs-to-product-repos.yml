    git add docs
    git commit -m "updated survey-creator docs [azurepipelines skip]"
    git pull origin $(CurrentBranch)
    git push origin $(CurrentBranch)
  displayName: "Creator - push docs to github"

- powershell: |
    cd $(Build.SourcesDirectory)/survey-analytics
    $env:GIT_REDIRECT_STDERR = '2>&1'
    git config --global user.email "surveyjs.org@gmail.com"
    git config --global user.name "surveyjsdeveloper"
    git pull origin $(CurrentBranch)
    git fetch origin $(CurrentBranch) --tags --force
    git checkout $(CurrentBranch)
    git add docs
    git commit -m "updated survey-analytics docs [azurepipelines skip]"
    git pull origin $(CurrentBranch)
    git push origin $(CurrentBranch)
  displayName: "Analytics - push docs to github"

- powershell: |
    cd $(Build.SourcesDirectory)/survey-pdf
    $env:GIT_REDIRECT_STDERR = '2>&1'
    git config --global user.email "surveyjs.org@gmail.com"
    git config --global user.name "surveyjsdeveloper"
    git pull origin $(CurrentBranch)
    git fetch origin $(CurrentBranch) --tags --force
    git checkout $(CurrentBranch)
    git add docs
    git commit -m "updated survey-pdf docs [azurepipelines skip]"
    git pull origin $(CurrentBranch)
