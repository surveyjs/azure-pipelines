- task: PowerShell@2
  displayName: 'Copy Specific Config'
  inputs:
    targetType: inline
    script: Copy-Item -Path "$(Build.Repository.LocalPath)/surveyjs.io/robots.tst" -Destination "$(Build.Repository.LocalPath)/surveyjs.io/robots.txt"
- task: VSBuild@1
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

- task: VSTest@2
  inputs:
    platform: '$(buildPlatform)'
    configuration: '$(testConfiguration)'

- task: PublishBuildArtifacts@1
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: SurveyJSSite

- task: AzureRmWebAppDeployment@4
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'SJS2'
    appType: 'webApp'
    WebAppName: 'surveyjstest'
    packageForLinux: '$(Build.ArtifactStagingDirectory)/surveyjs.io.zip'
