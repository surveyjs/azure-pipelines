# AI fix pipeline for FLAKY Playwright tests (pilot: Library React).
# Reactive: runs after a Library pipeline build, inspects that run's test-results for flaky tests,
# and only builds + fixes when flaky tests are present. This pipeline runs in the azure-pipelines
# repo (so `self` is azure-pipelines); it checks out survey-library explicitly via the LibraryRepo
# resource and operates on it.
# Requires variable group `ai-fix-secrets` (ANTHROPIC_API_KEY, GITHUB_TOKEN). Self-contained.

trigger: none
pr: none

resources:
  pipelines:
    - pipeline: Library
      source: Library PRs
      trigger:
        branches:
          include:
            - flaky-test
  repositories:
    # This pipeline runs in the azure-pipelines repo, so `self` is NOT survey-library.
    # Declare survey-library explicitly so the Fix job can check it out and operate on it.
    - repository: LibraryRepo
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-library

parameters:
  - name: buildId           # Library build id to download artifacts from (default: the triggering run)
    type: string
    default: ""
  - name: dryRun            # true = produce report only, do not open a PR
    type: boolean
    default: false

variables:
  - group: ai-fix-secrets
  - template: templates/utils/variables.yml
  - ${{ if ne(parameters.buildId, '') }}:
      - name: LibraryBuildId
        value: ${{ parameters.buildId }}
  - ${{ else }}:
      - name: LibraryBuildId
        value: $(resources.pipeline.Library.runID)

stages:
  - stage: AIFixFlaky
    displayName: "AI fix flaky tests"
    jobs:
      # ── Job 1: cheap inspection — download the triggering run's reports and parse them.
      - job: Inspect
        displayName: "Inspect triggering build for flaky tests"
        timeoutInMinutes: 15
        steps:
          - checkout: none

          # Download the triggering run's test-results (Container artifacts). continueOnError so a
          # missing artifact just yields "no flaky" instead of failing the job.
          - task: DownloadBuildArtifacts@1
            displayName: "Download test-results from triggering run"
            inputs:
              buildType: specific
              project: $(System.TeamProjectId)
              definition: $(resources.pipeline.Library.pipelineID)
              buildVersionToDownload: specific
              buildId: $(LibraryBuildId)
              downloadType: specific
              itemPattern: "Library_React_*/**"
              downloadPath: $(Agent.TempDirectory)
            continueOnError: true

          # Parse results.json from each downloaded report -> HAS_FLAKY + EXTRACTED_FLAKY_TESTS.
          - bash: |
              set -uo pipefail
              REPORTS=""
              for P in "$(Agent.TempDirectory)"/Library_React_*/results.json; do
                [ -f "$P" ] && REPORTS="$REPORTS$P"$'\n'
              done
              if [ -z "$REPORTS" ]; then
                echo "No results.json downloaded — no flaky tests."
                echo "##vso[task.setvariable variable=HAS_FLAKY;isOutput=true]false"
                echo "##vso[task.setvariable variable=EXTRACTED_FLAKY_TESTS;isOutput=true]"
                exit 0
              fi
              cat > /tmp/extract_flaky.js <<'JS'
              const fs = require("fs");
              const files = (process.env.REPORTS || "").split("\n").map(s => s.trim()).filter(Boolean);
              const norm = f => { const m = (f || "").match(/(?:e2e|screenshots)\/.*\.spec\.ts$/); return m ? m[0] : null; };
              const flaky = new Set();
              const clean = s => (s || "").replace(/;/g, " ").replace(/::/g, ": ").trim();
              // Build the FULL test title (describe chain + test), excluding the file-level suite,
              // so the gate can target one framework variant (e.g. "react autoNextPage") precisely.
              const walk = (suite, prefix) => {
                const isFile = /\.spec\.ts$/.test(suite.title || "");
                const pfx = (suite.title && !isFile)
                  ? (prefix ? prefix + " › " + suite.title : suite.title)
                  : prefix;
                (suite.specs || []).forEach(spec => (spec.tests || []).forEach(t => {
                  if (t.status === "flaky") {
                    const f = norm(spec.file || suite.file);
                    const full = pfx ? pfx + " › " + (spec.title || "") : (spec.title || "");
                    if (f) flaky.add(f + "::" + clean(full) + "::" + t.projectName);
                  }
                }));
                (suite.suites || []).forEach(s => walk(s, pfx));
              };
              files.forEach(file => { try { walk(JSON.parse(fs.readFileSync(file, "utf8")), ""); } catch (e) { console.error("skip " + file + ": " + e.message); } });
              process.stdout.write([...flaky].join(";"));
              JS
              FLAKY="$(REPORTS="$REPORTS" node /tmp/extract_flaky.js)"
              if [ -z "$FLAKY" ]; then
                echo "No flaky tests in downloaded report(s)."
                echo "##vso[task.setvariable variable=HAS_FLAKY;isOutput=true]false"
                echo "##vso[task.setvariable variable=EXTRACTED_FLAKY_TESTS;isOutput=true]"
              else
                echo "Detected flaky test(s):"; echo "$FLAKY" | tr ';' '\n' | sed 's/^/  /'
                echo "##vso[task.setvariable variable=HAS_FLAKY;isOutput=true]true"
                echo "##vso[task.setvariable variable=EXTRACTED_FLAKY_TESTS;isOutput=true]$FLAKY"
              fi
            name: extract
            displayName: "Extract flaky tests from report(s)"
            condition: always()

          # Resolve the PR base branch and dedup BEFORE the expensive Fix job runs — if an open
          # ai-flaky-fix PR for this base already exists, skip the whole build + AI step.
          - powershell: |
              $env:GIT_REDIRECT_STDERR = '2>&1'

              # Resolve the survey-library base branch the fix PR should target.
              # PR validation build — sourceBranch is refs/pull/<N>/merge; resolve the PR's head branch
              # so the fix merges into that same PR. For a branch build, strip refs/heads/.
              $src = "$(resources.pipeline.Library.sourceBranch)"
              if ($src -match '^refs/pull/(\d+)/') {
                $prNum = $Matches[1]
                $base = (gh pr view $prNum --repo surveyjs/survey-library --json headRefName -q .headRefName).Trim()
                if (-not $base) {
                  Write-Host "Could not resolve head branch for PR #$prNum; skipping fix."
                  Write-Host "##vso[task.setvariable variable=PR_BASE;isOutput=true]"
                  Write-Host "##vso[task.setvariable variable=SHOULD_FIX;isOutput=true]false"
                  exit 0
                }
                Write-Host "PR build: fix PR will target PR #$prNum head branch '$base'."
              } else {
                $base = $src -replace '^refs/heads/', ''
              }

              # Ensure the label exists (idempotent) so the dedup query below can filter by it.
              gh label create ai-flaky-fix --repo surveyjs/survey-library --color FBCA04 --description "Automated flaky-test stabilization" 2>$null

              # Dedup: skip if an open ai-flaky-fix PR for this base already exists.
              $openJson = gh pr list --repo surveyjs/survey-library --state open --base $base --label ai-flaky-fix --json headRefName 2>$null
              if ($openJson) {
                $dupe = ($openJson | ConvertFrom-Json) | Where-Object { $_.headRefName -like "ai-fix/flaky-$base-*" }
                if ($dupe) {
                  Write-Host "Open ai-flaky-fix PR already exists for $base ($($dupe.headRefName)); skipping fix."
                  Write-Host "##vso[task.setvariable variable=PR_BASE;isOutput=true]$base"
                  Write-Host "##vso[task.setvariable variable=SHOULD_FIX;isOutput=true]false"
                  exit 0
                }
              }

              Write-Host "Will stabilize flaky tests; PR base = '$base'."
              Write-Host "##vso[task.setvariable variable=PR_BASE;isOutput=true]$base"
              Write-Host "##vso[task.setvariable variable=SHOULD_FIX;isOutput=true]true"
            name: gate
            displayName: "Resolve PR base & dedup (skip if open fix PR exists)"
            condition: eq(variables['extract.HAS_FLAKY'], 'true')
            env:
              GH_TOKEN: $(GITHUB_TOKEN)
              GITHUB_TOKEN: $(GITHUB_TOKEN)

      # ── Job 2: the expensive build + AI fix. Runs only when Inspect found flaky tests AND no
      # open ai-flaky-fix PR already exists for the target base (dedup decided in Inspect).
      - job: Fix
        displayName: "Stabilize flaky react tests"
        dependsOn: Inspect
        timeoutInMinutes: 120
        condition: eq(dependencies.Inspect.outputs['gate.SHOULD_FIX'], 'true')
        variables:
          AUTO_FLAKY: $[ dependencies.Inspect.outputs['extract.EXTRACTED_FLAKY_TESTS'] ]
          PR_BASE: $[ dependencies.Inspect.outputs['gate.PR_BASE'] ]
          LibDir: $(Pipeline.Workspace)/library
          PromptFile: $(Pipeline.Workspace)/azure-pipelines/prompts/flaky-fix.md
        steps:
          # Check out THIS repo (self = azure-pipelines) to read the AI prompt file under prompts/.
          - checkout: self
            path: azure-pipelines     # → $(Pipeline.Workspace)/azure-pipelines (separate from library)
            fetchDepth: 1
            displayName: "Checkout azure-pipelines (AI prompts)"

          - checkout: LibraryRepo
            persistCredentials: true
            path: library          # → $(Pipeline.Workspace)/library; keeps the repo working tree
            displayName: "Checkout survey-library"   # separate from ai-fix-out so `git add -A` is safe
            timeoutInMinutes: 5
            retryCountOnTaskFailure: 5
            fetchDepth: 1

          - bash: |
              set -euo pipefail
              SRC="$(resources.pipeline.Library.sourceBranch)"
              echo "Triggering Library build ran on: $SRC"
              SD="$(LibDir)"
              case "$SRC" in
                # PR validation build — sourceBranch is refs/pull/<N>/merge|head. The /merge ref is
                # transient; fetch the stable /head (the PR branch tip), matching build.yml's convention.
                refs/pull/*)
                  PR_NUM="$(echo "$SRC" | sed -E 's#^refs/pull/([0-9]+)/.*#\1#')"
                  echo "PR build detected (PR #$PR_NUM); fetching pull/$PR_NUM/head"
                  git -C "$SD" fetch --depth 1 origin "pull/$PR_NUM/head"
                  ;;
                *)
                  BRANCH="$(echo "$SRC" | sed 's#^refs/heads/##')"
                  echo "Branch build; fetching $BRANCH"
                  git -C "$SD" fetch --depth 1 origin "$BRANCH"
                  ;;
              esac
              git -C "$SD" checkout FETCH_HEAD
            displayName: "Switch survey-library to triggering branch"

          - template: templates/utils/npm.yml
            parameters:
              directories:
                - $(LibDir)
                - $(LibDir)/packages/survey-core
                - $(LibDir)/packages/survey-react-ui
                # - $(LibDir)/packages/survey-angular-ui
                # - $(LibDir)/packages/survey-angular-ui/example
                # - $(LibDir)/packages/survey-vue3-ui
                # - $(LibDir)/packages/survey-vue3-ui/example
                # - $(LibDir)/packages/survey-js-ui

          - script: npm run build:all
            workingDirectory: $(LibDir)/packages/survey-core
            displayName: "Build Core"

          - script: npm run build
            workingDirectory: $(LibDir)/packages/survey-react-ui
            displayName: "Build React"

          # - script: npm run build
          #   workingDirectory: $(LibDir)/packages/survey-angular-ui
          #   displayName: "Build Angular"

          # - script: npm run build:example:prod
          #   workingDirectory: $(LibDir)/packages/survey-angular-ui
          #   displayName: "Build Angular Example"

          # - script: npm run build
          #   workingDirectory: $(LibDir)/packages/survey-vue3-ui
          #   displayName: "Build Vue3"

          # - script: npm run build:example:prod
          #   workingDirectory: $(LibDir)/packages/survey-vue3-ui
          #   displayName: "Build Vue3 Example"

          # - script: npm run build
          #   workingDirectory: $(LibDir)/packages/survey-js-ui
          #   displayName: "Build JS"

          # re-download the originals (evidence doesn't survive across jobs) and stage them for the agent
          - task: DownloadBuildArtifacts@1
            displayName: "Download original flake evidence"
            inputs:
              buildType: specific
              project: $(System.TeamProjectId)
              definition: $(resources.pipeline.Library.pipelineID)
              buildVersionToDownload: specific
              buildId: $(LibraryBuildId)
              downloadType: specific
              itemPattern: "Library_React_*/**"
              downloadPath: $(Agent.TempDirectory)
            continueOnError: true

          - bash: |
              set -uo pipefail
              DEST="$(Pipeline.Workspace)/ai-fix-out/original-flake-evidence"
              mkdir -p "$DEST"
              for SRC in "$(Agent.TempDirectory)"/Library_React_*; do
                [ -d "$SRC" ] && cp -r "$SRC" "$DEST/"
              done
              echo "Original flake evidence staged under $DEST:"; ls -la "$DEST" || true
            displayName: "Stage original flake evidence for the agent"
            condition: always()

          # reproduce flaky tests with retries disabled to seed fresh evidence for the agent
          - bash: |
              set -uo pipefail
              cd "$(LibDir)/packages/survey-react-ui"
              # Target each flaky test precisely (file + project + full-title grep) so the agent
              # gets evidence for ONLY the flaky variant, not every framework in the spec file.
              cat > /tmp/repro_targets.js <<'JS'
              const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const reFromTitle = t => t.split(" › ").map(p => esc(p.trim())).filter(Boolean).join(".*");
              const out = [];
              (process.env.FLAKY_TESTS || "").split(";").map(s => s.trim()).filter(Boolean).forEach(e => {
                const p = e.split("::");
                const file = (p[0] || "").trim();
                const title = (p[1] || "").trim();
                const project = (p[2] || "").trim();
                if (!file.endsWith(".spec.ts") || !title || !project) return;
                out.push([file, project, reFromTitle(title)].join("\t"));
              });
              process.stdout.write(out.join("\n"));
              JS
              TARGETS="$(node /tmp/repro_targets.js)"
              while IFS=$'\t' read -r FILE PROJECT TITLE_RE; do
                [ -z "$FILE" ] && continue
                echo "── Reproducing [$PROJECT] $FILE  -g /$TITLE_RE/"
                npx playwright test "$FILE" --project "$PROJECT" -g "$TITLE_RE" --retries=0 --repeat-each=5 || true
              done <<< "$TARGETS"
            displayName: "Reproduce flaky tests (retries=0)"
            continueOnError: true
            env:
              FLAKY_TESTS: $(AUTO_FLAKY)

          # install the headless Claude Code CLI
          # The agent user can't write to the default global prefix (/usr/lib/node_modules -> EACCES),
          # so point npm's global prefix at a user-writable dir and expose its bin on PATH.
          - bash: |
              set -euo pipefail
              NPM_PREFIX="$(Agent.TempDirectory)/npm-global"
              mkdir -p "$NPM_PREFIX"
              npm config set prefix "$NPM_PREFIX"
              npm install -g @anthropic-ai/claude-code
              echo "##vso[task.prependpath]$NPM_PREFIX/bin"
            displayName: "Install Claude Code CLI"
            retryCountOnTaskFailure: 2

          # Claude Code: diagnose + fix ONLY test code; writes report to ai-fix-out/
          - bash: |
              set -uo pipefail
              # Write AI artifacts OUTSIDE test-results: the agent runs `npx playwright test`,
              # and Playwright wipes its outputDir (test-results/) at the start of EVERY run —
              # that would unlink this JSON mid-write (-> ENOENT in the parser below) and also
              # destroy the staged original-flake-evidence.
              AI_OUT="$(Pipeline.Workspace)/ai-fix-out"
              mkdir -p "$AI_OUT"
              cd "$(LibDir)"   # agent cwd = repo root (test code lives here)

              # AI instructions live in the azure-pipelines repo (checked out above as `self`).
              STATIC_PROMPT="$(cat "$(PromptFile)")"
              echo "Loaded AI prompt from $(PromptFile) (${#STATIC_PROMPT} chars)"

              FULL_PROMPT="$STATIC_PROMPT

              Target flaky tests to fix (format: <relPath>::<title>::<project>; ';'-separated):
              ${FLAKY_TESTS:-}

              Original flake evidence directory (absolute): $AI_OUT/original-flake-evidence

              Fix at most 10 tests."

              echo "Running Claude Code (model=claude-sonnet-4-6, max-turns=40)..."
              claude -p "$FULL_PROMPT" \
                --bare \
                --output-format json \
                --model "claude-sonnet-4-6" \
                --max-turns 40 \
                --permission-mode dontAsk \
                --allowedTools "Read,Grep,Glob,Edit,Bash(cd *),Bash(npx playwright test *),Bash(git diff *),Bash(git status *)" \
                --disallowedTools "Bash(git push *),Bash(git commit *),Bash(git reset *),Bash(git checkout *),Bash(rm *),WebFetch,WebSearch" \
                > "$AI_OUT/ai-fix-claude-output.json" 2> "$AI_OUT/ai-fix-claude-stderr.txt" \
                || echo "claude exited non-zero (continuing to guard step)"

              cat > /tmp/ai_parse.js <<'JS'
              const fs = require("fs");
              const dir = process.env.AI_OUT;
              let o = {};
              try { o = JSON.parse(fs.readFileSync(dir + "/ai-fix-claude-output.json", "utf8")); }
              catch (e) { console.log("Could not parse Claude JSON output: " + e.message); process.exit(0); }
              const L = [];
              L.push("=== AI FIX REPORT ===");
              L.push("model: "    + (o.model         != null ? o.model         : process.env.MODEL || "n/a"));
              L.push("cost_usd: " + (o.total_cost_usd != null ? o.total_cost_usd : "n/a"));
              L.push("is_error: " + (o.is_error       != null ? o.is_error       : "n/a"));
              L.push("num_turns: "+ (o.num_turns      != null ? o.num_turns      : "n/a"));
              L.push("");
              L.push(o.result || "(no result text)");
              const out = L.join("\n");
              fs.writeFileSync(dir + "/ai-fix-report.txt", out);
              console.log(out);
              JS
              AI_OUT="$AI_OUT" MODEL="claude-sonnet-4-6" node /tmp/ai_parse.js
            displayName: "Claude: diagnose & fix flaky tests"
            timeoutInMinutes: 30
            env:
              ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
              CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
              FLAKY_TESTS: $(AUTO_FLAKY)

          # Surface the agent's raw changes in the CI log (before the guard reverts anything).
          # `git add -N` lets the diff include any NEW untracked files too; it's undone right after
          # so the guard/PR steps see an unmodified index.
          - bash: |
              set -uo pipefail
              cd "$(LibDir)"
              git add -N -- e2e screenshots 2>/dev/null || true
              echo "===== Summary (git diff --stat) ====="
              git diff --stat || true
              echo
              echo "===== Full diff (git diff) ====="
              git --no-pager diff || true
              git reset -q -- e2e screenshots 2>/dev/null || true
            displayName: "Show agent's changes (diff)"
            condition: always()

          # Guard: revert everything unless ONLY test code (e2e/**, screenshots/**/*.spec.ts) changed
          - bash: |
              set -uo pipefail
              cd "$(LibDir)"
              CHANGED="$(git diff --name-only)"
              echo "Files changed by agent:"
              echo "${CHANGED:-<none>}"

              if [ -z "$CHANGED" ]; then
                echo "##vso[task.logissue type=warning]Agent produced no changes (likely a product bug or non-reproducible flake)."
                echo "##vso[task.setvariable variable=AI_HAS_FIX]false"
                exit 0
              fi

              VIOLATION=0
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                case "$f" in
                  *-snapshots/*)                         echo "FORBIDDEN (baseline snapshot): $f"; VIOLATION=1 ;;
                  src/*|packages/*/src/*)                echo "FORBIDDEN (product source): $f";   VIOLATION=1 ;;
                  e2e/*.ts|e2e/*/*.ts|e2e/*/*/*.ts)      : ;;
                  screenshots/*.spec.ts|screenshots/*/*.spec.ts) : ;;
                  *)                                     echo "FORBIDDEN (outside test allow-list): $f"; VIOLATION=1 ;;
                esac
              done <<< "$CHANGED"

              if [ "$VIOLATION" -ne 0 ]; then
                echo "##vso[task.logissue type=error]Agent touched forbidden paths — reverting ALL changes, no fix will be committed."
                git checkout -- .
                echo "##vso[task.setvariable variable=AI_HAS_FIX]false"
                exit 0
              fi

              echo "All changes are within the test-code allow-list."
              echo "##vso[task.setvariable variable=AI_HAS_FIX]true"
            displayName: "Guard: only test code may change"

          # Re-run gate: the fixed tests must pass reliably (retries=0, repeat-each) before we PR
          - bash: |
              set -euo pipefail
              cd "$(LibDir)/packages/survey-react-ui"

              # Turn each flaky entry "<relPath>::<title>::<project>" into a precise target:
              # one line per test = "<file>\t<project>\t<grep-regex>". The grep regex matches the
              # full title path (describe chain + test) so only THAT framework variant runs —
              # never the whole spec file across angular/react/vue.
              cat > /tmp/ai_gate_targets.js <<'JS'
              const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const reFromTitle = t => t.split(" › ").map(p => esc(p.trim())).filter(Boolean).join(".*");
              const out = [];
              (process.env.FLAKY_TESTS || "").split(";").map(s => s.trim()).filter(Boolean).forEach(e => {
                const p = e.split("::");
                const file = (p[0] || "").trim();
                const title = (p[1] || "").trim();
                const project = (p[2] || "").trim();
                if (!file.endsWith(".spec.ts") || !title || !project) return;
                out.push([file, project, reFromTitle(title)].join("\t"));
              });
              process.stdout.write(out.join("\n"));
              JS
              TARGETS="$(FLAKY_TESTS="${FLAKY_TESTS:-}" node /tmp/ai_gate_targets.js)"

              if [ -z "$TARGETS" ]; then
                echo "##vso[task.logissue type=warning]No flaky test targets identified to gate — skipping PR."
                echo "##vso[task.setvariable variable=AI_HAS_FIX]false"
                exit 0
              fi

              echo "Gate targets:"; echo "$TARGETS" | sed 's/^/  /'

              REPEAT="5"
              while IFS=$'\t' read -r FILE PROJECT TITLE_RE; do
                [ -z "$FILE" ] && continue
                echo "── Gating [$PROJECT] $FILE  -g /$TITLE_RE/"
                npx playwright test "$FILE" --project "$PROJECT" -g "$TITLE_RE" --retries=0 --repeat-each="$REPEAT"
              done <<< "$TARGETS"

              echo "Re-run gate passed: fixed tests are stable."
            displayName: "Re-run gate (retries=0, repeat-each) — green required before commit"
            condition: eq(variables['AI_HAS_FIX'], 'true')
            env:
              FLAKY_TESTS: $(AUTO_FLAKY)

          # Build the PR body from the AI report (base resolution + dedup already happened in Inspect).
          - powershell: |
              $base = "$(PR_BASE)"
              $reportFile = "$(Pipeline.Workspace)/ai-fix-out/ai-fix-report.txt"
              $report = if (Test-Path $reportFile) { Get-Content $reportFile -Raw } else { "AI-stabilized flaky tests." }
              $body = "Automated flaky-test stabilization by Claude Code (headless).`n`n" +
                      "Branch: $base`n`n---`n`n$report"
              $bodyFile = "$(Pipeline.Workspace)/ai-fix-out/pr-body.txt"
              Set-Content -Path $bodyFile -Value $body -Encoding utf8
              Write-Host "Wrote PR body to $bodyFile"
            displayName: "Prepare PR body"
            condition: and(succeeded(), eq(variables['AI_HAS_FIX'], 'true'))

          # commit test-code fix to a NEW branch and open a NEW PR (skipped on dryRun).
          # Reuses the shared pr-create template: commit `git add -A` + push + `gh pr create`.
          # `git add -A` is safe here — ai-fix-out lives outside $(LibDir), and the guard step
          # already reverted anything outside the test-code allow-list.
          - ${{ if eq(parameters.dryRun, false) }}:
              - template: templates/utils/pr-create.yml
                parameters:
                  src: surveyjs/survey-library
                  srcBranch: $(PR_BASE)
                  targetBranch: ai-fix/flaky-$(PR_BASE)-$(Build.BuildId)
                  workingDir: $(LibDir)
                  label: ai-flaky-fix
                  commitMessage: "[ai_fix] stabilize flaky tests on $(PR_BASE)"
                  prTitle: "[ai_fix] Stabilize flaky tests ($(PR_BASE))"
                  prBodyFile: $(Pipeline.Workspace)/ai-fix-out/pr-body.txt

          # always publish the AI report / Claude output for inspection
          - task: PublishBuildArtifacts@1
            displayName: "Publish AI fix report"
            inputs:
              PathtoPublish: "$(Pipeline.Workspace)/ai-fix-out"
              ArtifactName: "AIFix_Report"
              publishLocation: "Container"
            condition: always()
