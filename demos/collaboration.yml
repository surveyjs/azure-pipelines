trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

jobs:
  - job: Deploy
    timeoutInMinutes: 70
    steps:
      - checkout: none
      - task: SSH@0
        displayName: make up-collaboration
        timeoutInMinutes: 60
        failOnStdErr: false
        inputs:
          sshEndpoint: 'sjsdemo'
          runOptions: commands
          commands: make -C /survey/env up-collaboration
