# Manually-triggered pipeline that opens a NEW PR in surveyjs/survey-library.
# Writes a trivial timestamp marker, commits it to a fresh branch, and opens the PR.
# Runs in the azure-pipelines repo (so `self` is azure-pipelines); checks out
# survey-library explicitly via the LibraryRepo resource.
# Requires variable group `ai-fix-secrets` (GITHUB_TOKEN). Self-contained.

trigger: none
pr: none

resources:
  repositories:
    # This pipeline runs in the azure-pipelines repo, so `self` is NOT survey-library.
    - repository: LibraryRepo
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-library

parameters:
  - name: baseBranch        # branch in survey-library the PR targets
    type: string
    default: master

variables:
  - group: ai-fix-secrets

stages:
  - stage: CreatePR
    displayName: "Create Library PR"
    jobs:
      - job: OpenPR
        displayName: "Open a new PR in survey-library"
        timeoutInMinutes: 15
        steps:
          - checkout: LibraryRepo
            persistCredentials: true
            displayName: "Checkout survey-library"
            fetchDepth: 1

          # External change prepared by THIS pipeline: a trivial timestamp marker so the PR has a diff.
          - powershell: |
              $stamp  = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
              $marker = Join-Path "$(Build.SourcesDirectory)" ".ai-pr-marker.md"
              Add-Content -Path $marker -Value "PR created by pipeline $(Build.BuildId) at $stamp"
              Write-Host "Wrote marker: $marker"
            displayName: "Write timestamp marker"

          # Commit the marker to a new branch and open the PR.
          - template: templates/utils/pr-create.yml
            parameters:
              src: surveyjs/survey-library
              srcBranch: ${{ parameters.baseBranch }}
              targetBranch: auto-pr/$(Build.BuildId)
              commitMessage: "[auto-pr] timestamp marker ($(Build.BuildId))"
              prTitle: "[auto-pr] Library PR from build $(Build.BuildId)"
              prBody: "Automated PR opened by the create-library-pr pipeline.`n`nBuild: $(Build.BuildId)`nBase: ${{ parameters.baseBranch }}"
