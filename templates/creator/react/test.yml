parameters:
  - name: checkout
    type: string
    default: self

jobs:
  - job:
    displayName: "Example & A11Y"
    steps:
      - template: build.yml
        parameters:
          checkout: ${{ parameters.checkout }}

      - script: npm run build
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react/example
        displayName: "Build Example"

      - script: npm run test
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Test"

      - script: npm run test:a11y:ci
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Test A11Y"

  - job:
    displayName: "E2E"
    steps:
      - template: build.yml
        parameters:
          checkout: ${{ parameters.checkout }}
        
      - script: npm run e2e:ci
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Test E2E"

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          ArtifactName: "Creator_React_E2E"
          publishLocation: "Container"
        condition: always()
        displayName: "Publish artifacts"

      - task: PublishTestResults@2
        inputs:
          searchFolder: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          testResultsFormat: "JUnit"
          testResultsFiles: "e2e-junit-results.xml"
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: "Creator React E2E Tests"
        condition: succeededOrFailed()
        displayName: "Publish results"

  - job:
    displayName: "SCR Test"
    condition: eq(variables['SCR_UPDATE'], '')
    steps:
      - template: build.yml
        parameters:
          checkout: ${{ parameters.checkout }}
        
      - script: npm run test:scr:ci
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Test SCR"

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          ArtifactName: "Creator_React_SCR"
          publishLocation: "Container"
        condition: always()
        displayName: "Publish artifacts"

      - task: PublishTestResults@2
        inputs:
          searchFolder: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          testResultsFormat: "JUnit"
          testResultsFiles: "e2e-junit-results.xml"
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: "Creator React SCR Tests"
        condition: succeededOrFailed()
        displayName: "Publish results"

  - job:
    displayName: "SCR Update"
    condition: ne(variables['SCR_UPDATE'], '')
    steps:
      - template: build.yml
        parameters:
          checkout: ${{ parameters.checkout }}

      - script: npx playwright test --project scr --update-snapshots
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Update SCR"

      - powershell: |
          $env:GIT_REDIRECT_STDERR = '2>&1'
          git config --global user.email "surveyjs.org@gmail.com"
          git config --global user.name "surveyjsdeveloper"
          git add $(Build.SourcesDirectory)/screenshotTests
          if (git status --porcelain) {
              git commit -m "updated screenshots [azurepipelines skip]" --no-verify
              git pull --rebase origin "$(System.PullRequest.SourceBranch)"
              git push --no-verify origin "HEAD:$(System.PullRequest.SourceBranch)"
          }
        displayName: "commit updated screenshots"
        condition: and(succeeded(), ne(variables['System.PullRequest.SourceBranch'], ''))

  - job:
    displayName: "SCR Legacy"
    condition: ne(variables['System.PullRequest.TargetBranch'], 'V3')
    steps:
      - template: build.yml
        parameters:
          checkout: ${{ parameters.checkout }}
        
      - script: npm run test:scr:legacy:ci
        workingDirectory: $(Build.SourcesDirectory)/packages/survey-creator-react
        displayName: "Test SCR Legacy"

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          ArtifactName: "Creator_React_SCR_Legacy"
          publishLocation: "Container"
        condition: always()
        displayName: "Publish artifacts"

      - task: PublishTestResults@2
        inputs:
          searchFolder: "$(Build.SourcesDirectory)/packages/survey-creator-react/test-results"
          testResultsFormat: "JUnit"
          testResultsFiles: "e2e-junit-results.xml"
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: "Creator React SCR Legacy Tests"
        condition: succeededOrFailed()
        displayName: "Publish results"
