steps:
  - checkout: self
    fetchDepth: 1
    timeoutInMinutes: 2
    retryCountOnTaskFailure: 3
  - bash: |
      set -e
      SOURCE_SHA="$(System.PullRequest.SourceCommitId)"
      if [[ -n "$SOURCE_SHA" ]]; then
        # PR build: fetch the actual source commit and read its message,
        # otherwise HEAD points to a temporary "Merge X into Y" merge commit.
        git fetch --depth=1 origin "$SOURCE_SHA"
        COMMIT_MESSAGE=$(git log -1 --format=%B "$SOURCE_SHA")
      else
        COMMIT_MESSAGE=$(git log -1 --format=%B HEAD)
      fi
      echo "Commit Message: $COMMIT_MESSAGE"

      # Extract all [name] and [name: value] pairs from commit message and export as pipeline variables.
      # Bare [name] tags default to "true".
      while IFS== read -r NAME VALUE; do
        NAME="${NAME^^}"
        if [[ "$NAME" =~ ^[A-Z_]+$ ]]; then
          [[ -z "$VALUE" ]] && VALUE="true"
          echo "Extracted: ${NAME}=${VALUE}"
          echo "##vso[task.setvariable variable=${NAME};isOutput=true]${VALUE}"
        else
          echo "Skipping invalid variable name: ${NAME}"
        fi
      done < <(echo "$COMMIT_MESSAGE" | grep -oE '\[[A-Za-z_]+(\s*:[^]]+)?\]' | sed -E 's/\[\s*([A-Za-z_]+)\s*(:\s*(.*?))?\s*\]/\1=\3/')
    name: data
