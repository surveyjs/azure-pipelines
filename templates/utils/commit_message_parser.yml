steps:
  - checkout: self
    fetchDepth: 1
  - bash: |
      COMMIT_SHA="$(System.PullRequest.SourceCommitId)"
      git fetch --no-tags --depth=1 origin "${COMMIT_SHA}" 2>/dev/null || true
      COMMIT_MESSAGE=$(git log -1 --format=%B "${COMMIT_SHA}" 2>/dev/null \
        || git log -1 --format=%B HEAD^2 2>/dev/null \
        || git log -1 --format=%B HEAD) || {
        echo "##vso[task.logissue type=warning]Failed to read commit message"
        exit 0
      }
      echo "Commit Message: $COMMIT_MESSAGE"

      # Extract all [name] and [name: value] pairs from commit message and export as pipeline variables.
      # Bare [name] tags default to "true".
      while IFS== read -r NAME VALUE; do
        NAME="${NAME^^}"
        if [[ "$NAME" =~ ^[A-Z_]+$ ]]; then
          [[ -z "$VALUE" ]] && VALUE="true"
          echo "Extracted: ${NAME}=${VALUE}"
          echo "##vso[task.setvariable variable=${NAME};isOutput=true]${VALUE}"
        else
          echo "Skipping invalid variable name: ${NAME}"
        fi
      done < <(echo "$COMMIT_MESSAGE" | grep -oE '\[[A-Za-z_]+(\s*:[^]]+)?\]' | sed -E 's/\[\s*([A-Za-z_]+)\s*(:\s*(.*?))?\s*\]/\1=\3/')
    name: data
