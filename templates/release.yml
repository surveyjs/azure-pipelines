# SurveyJS release pipeline

# Need to be configured in UI:
# projectsBranch - branch to checkout repos and release from (e.g. "main" / "master" / "V3")
# runReleaseArgs - arguments for the release script
# npmPublishArgs - arguments for the npm publish script
# azureBlobContainer - Azure Blob Storage container name
# azureBlobSubscription - Azure subscription name for the Azure Blob Storage service connection

# Projects list for npm publish stage (each usage)
parameters:
  - name: pkgList
    type: object
    default:
      - survey-core
      - survey-react-ui
      - survey-angular-ui
      - survey-vue3-ui
      - survey-js-ui
      - survey-creator-core
      - survey-creator-react
      - survey-creator-angular
      - survey-creator-vue
      - survey-creator-js
      - survey-analytics
      - survey-pdf

resources:

  pipelines:

    - pipeline: LibraryMain
      source: Library Main
      trigger: none

    - pipeline: CreatorMain
      source: Creator Main
      trigger: none

    - pipeline: CustomWidgetsMain
      source: Custom Widgets Main
      trigger: none
      
    - pipeline: AnalyticsMain
      source: Analytics Main
      trigger: none

    - pipeline: PDFMain
      source: PDF Main
      trigger: none

  repositories:

    - repository: Library
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-library
      ref: refs/heads/$(projectsBranch)

    - repository: Creator
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-creator
      ref: refs/heads/$(projectsBranch)

    - repository: Analytics
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-analytics
      ref: refs/heads/$(projectsBranch)

    - repository: PDF
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-pdf
      ref: refs/heads/$(projectsBranch)

    - repository: CustomWidgets
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/custom-widgets
      ref: refs/heads/$(projectsBranch)

    - repository: Service 
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/service
      ref: refs/heads/$(projectsBranch)



#trigger only "by hand"
trigger: none
pr: none



jobs:
- job: Release
  timeoutInMinutes: 90
  steps:
    
  # Verify the latest run of each upstream *Main pipeline succeeded
  - pwsh: |
      $ErrorActionPreference = 'Stop'

      $orgUrl  = "$(System.TeamFoundationCollectionUri)"
      $project = "$(System.TeamProject)"
      $token   = "$env:SYSTEM_ACCESSTOKEN"

      if ([string]::IsNullOrWhiteSpace($token)) {
        Write-Error "SYSTEM_ACCESSTOKEN is empty. Enable 'Allow scripts to access the OAuth token' on the job or pass it via env."
      }

      $headers = @{ Authorization = "Bearer $token" }

      $pipelines = @(
        @{ Alias = 'LibraryMain';        Id = "$(resources.pipeline.LibraryMain.pipelineID)" },
        @{ Alias = 'CreatorMain';        Id = "$(resources.pipeline.CreatorMain.pipelineID)" },
        @{ Alias = 'CustomWidgetsMain';  Id = "$(resources.pipeline.CustomWidgetsMain.pipelineID)" },
        @{ Alias = 'AnalyticsMain';      Id = "$(resources.pipeline.AnalyticsMain.pipelineID)" },
        @{ Alias = 'PDFMain';            Id = "$(resources.pipeline.PDFMain.pipelineID)" }
      )

      $failed = @()
      foreach ($p in $pipelines) {
        $alias = $p.Alias
        $id    = $p.Id

        if ([string]::IsNullOrWhiteSpace($id)) {
          Write-Error "[$alias] pipelineID is empty. Check resources.pipelines alias."
        }

        $projectEnc = [uri]::EscapeDataString($project)
        $url = "${orgUrl}${projectEnc}/_apis/build/builds?definitions=$id&statusFilter=completed&`$top=1&api-version=7.0"

        Write-Host "[$alias] GET $url"
        $resp = Invoke-RestMethod -Headers $headers -Uri $url -Method Get

        $build = $resp.value | Select-Object -First 1
        if (-not $build) {
          $failed += "[$alias] no completed builds found"
          continue
        }

        $line = "[$alias] buildId=$($build.id) result=$($build.result) finishTime=$($build.finishTime) sourceBranch=$($build.sourceBranch)"
        Write-Host $line

        if ($build.result -ne 'succeeded') {
          $failed += $line
        }
      }

      if ($failed.Count -gt 0) {
        Write-Host "##vso[task.logissue type=error]One or more upstream pipelines are not in 'succeeded' state:"
        $failed | ForEach-Object { Write-Host "##vso[task.logissue type=error]$_" }
        exit 1
      }

      Write-Host "All upstream pipelines are succeeded."
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    displayName: 'Verify upstream *Main pipelines succeeded'



  # Checkout repos
  - checkout: Library
    persistCredentials: true
    clean: true

  - checkout: Creator
    persistCredentials: true
    clean: true

  - checkout: Analytics
    persistCredentials: true
    clean: true

  - checkout: PDF
    persistCredentials: true
    clean: true

  - checkout: CustomWidgets
    persistCredentials: true
    clean: true

  - checkout: Service
    persistCredentials: true
    clean: true



  - template: templates/utils/npm.yml
    parameters:
      directories:
        - $(Build.SourcesDirectory)/survey-library
        - $(Build.SourcesDirectory)/survey-library/packages/survey-core
        - $(Build.SourcesDirectory)/survey-library/packages/survey-react-ui
        - $(Build.SourcesDirectory)/survey-library/packages/survey-angular-ui
        - $(Build.SourcesDirectory)/survey-library/packages/survey-vue3-ui
        - $(Build.SourcesDirectory)/survey-library/packages/survey-js-ui
        - $(Build.SourcesDirectory)/survey-creator
        - $(Build.SourcesDirectory)/survey-creator/packages/survey-creator-core
        - $(Build.SourcesDirectory)/survey-creator/packages/survey-creator-react
        - $(Build.SourcesDirectory)/survey-creator/packages/survey-creator-angular
        - $(Build.SourcesDirectory)/survey-creator/packages/survey-creator-vue
        - $(Build.SourcesDirectory)/survey-creator/packages/survey-creator-js
        - $(Build.SourcesDirectory)/custom-widgets
        - $(Build.SourcesDirectory)/survey-analytics
        - $(Build.SourcesDirectory)/survey-pdf



  - script: |
      git config --global user.email "surveyjs.org@gmail.com"
      git config --global user.name "surveyjsdeveloper"
    displayName: 'Set git config'



  # Bump versions and build packages
  - script: |
      cd packages/survey-core       && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build:all && cd -
      cd packages/survey-react-ui   && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-angular-ui && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-vue3-ui    && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-js-ui      && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
    workingDirectory: $(Build.SourcesDirectory)/survey-library
    displayName: 'Build survey-library'

  - script: |
      cd packages/survey-creator-core    && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build:all && cd -
      cd packages/survey-creator-react   && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-creator-angular && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-creator-vue     && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
      cd packages/survey-creator-js      && npm run release -- $(runReleaseArgs) --skip.commit --skip.tag && npm run build && cd -
    workingDirectory: $(Build.SourcesDirectory)/survey-creator
    displayName: 'Build survey-creator'

  - script: |
      npm run release -- $(runReleaseArgs) --skip.commit --skip.tag
      npm run build
    workingDirectory: $(Build.SourcesDirectory)/survey-analytics
    displayName: 'Build survey-analytics'

  - script: |
      npm run release -- $(runReleaseArgs) --skip.commit --skip.tag
      npm run build
    workingDirectory: $(Build.SourcesDirectory)/survey-pdf
    displayName: 'Build survey-pdf'

  - script: |
      npm run release -- $(runReleaseArgs) --skip.commit --skip.tag
      npm run build
    workingDirectory: $(Build.SourcesDirectory)/custom-widgets
    displayName: 'Build custom-widgets'



  # Commit and tag the release in each repo
  - script: |
      set -e

      cd $(Build.SourcesDirectory)/survey-library
      git add -A
      VERSION=$(node -p "require('./packages/survey-core/package.json').version")
      git commit -m "Release: $VERSION [azurepipelines skip]"
      git tag -a "v$VERSION" -m "Release: $VERSION"

      cd $(Build.SourcesDirectory)/survey-creator
      git add -A
      VERSION=$(node -p "require('./packages/survey-creator-core/package.json').version")
      git commit -m "Release: $VERSION [azurepipelines skip]"
      git tag -a "v$VERSION" -m "Release: $VERSION"

      cd $(Build.SourcesDirectory)/survey-analytics
      git add -A
      VERSION=$(node -p "require('./package.json').version")
      git commit -m "Release: $VERSION [azurepipelines skip]"
      git tag -a "v$VERSION" -m "Release: $VERSION"

      cd $(Build.SourcesDirectory)/survey-pdf
      git add -A
      VERSION=$(node -p "require('./package.json').version")
      git commit -m "Release: $VERSION [azurepipelines skip]"
      git tag -a "v$VERSION" -m "Release: $VERSION"

      cd $(Build.SourcesDirectory)/custom-widgets
      git add -A
      VERSION=$(node -p "require('./package.json').version")
      git commit -m "Release: $VERSION [azurepipelines skip]"
      git tag -a "v$VERSION" -m "Release: $VERSION"
    displayName: 'Commit and tag releases'



  # Copy builds to DevBuilds (just all builds in a single folder)
  - pwsh: |
      $devBuilds = "$(Build.SourcesDirectory)/service/surveyjs.io/DevBuilds"

      if (Test-Path $devBuilds) {
        Remove-Item -Path $devBuilds -Recurse -Force
      }
      New-Item -ItemType Directory -Force -Path $devBuilds | Out-Null

      $libraryPkgs = @('survey-core','survey-react-ui','survey-angular-ui','survey-vue3-ui','survey-js-ui')
      foreach ($pkg in $libraryPkgs) {
        $dest = Join-Path $devBuilds $pkg
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item -Recurse -Force -Path "$(Build.SourcesDirectory)/survey-library/packages/$pkg/build/*" -Destination $dest
      }

      $creatorPkgs = @('survey-creator-core','survey-creator-react','survey-creator-angular','survey-creator-vue','survey-creator-js')
      foreach ($pkg in $creatorPkgs) {
        $dest = Join-Path $devBuilds $pkg
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item -Recurse -Force -Path "$(Build.SourcesDirectory)/survey-creator/packages/$pkg/build/*" -Destination $dest
      }

      $singleRepos = @(
        @{ Pkg = 'surveyjs-widgets';   Src = "$(Build.SourcesDirectory)/custom-widgets/package" },
        @{ Pkg = 'survey-analytics';   Src = "$(Build.SourcesDirectory)/survey-analytics/build" },
        @{ Pkg = 'survey-pdf';         Src = "$(Build.SourcesDirectory)/survey-pdf/build" }
      )
      foreach ($r in $singleRepos) {
        $dest = Join-Path $devBuilds $r.Pkg
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item -Recurse -Force -Path "$($r.Src)/*" -Destination $dest
      }
    displayName: 'Copy builds to DevBuilds'



  # Publish DevBuilds artifact for review
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.SourcesDirectory)/service/surveyjs.io/DevBuilds'
      ArtifactName: 'DevBuilds'
      publishLocation: 'Container'
      StoreAsTar: true
    displayName: 'Publish DevBuilds artifact'



  # Upload to Azure Blobs
  - task: AzureCLI@2
    displayName: 'DevBuilds Upload to Azure Blobs'
    inputs:
      azureSubscription: '$(azureBlobSubscription)'
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $ErrorActionPreference = 'Stop'

        # CleanTargetBeforeCopy: remove existing blobs in the container first
        az storage blob delete-batch `
          --account-name surveyjsdocsstorage `
          --source "$(azureBlobContainer)" `
          --auth-mode login

        az storage blob upload-batch `
          --account-name surveyjsdocsstorage `
          --destination "$(azureBlobContainer)" `
          --source "$(Build.SourcesDirectory)/service/surveyjs.io/DevBuilds/" `
          --auth-mode login `
          --overwrite true



  # Publish to npm
  - ${{ each pkg in parameters.pkgList }}:
    - task: Npm@1
      inputs:
        command: "custom"
        workingDir: '$(Build.SourcesDirectory)/service/surveyjs.io/DevBuilds/${{ pkg }}'
        customCommand: "publish $(npmPublishArgs)"
        customEndpoint: 'NPM Registry V2'
        verbose: true
      displayName: 'npm publish ${{ pkg }}'



  # Push tags
  - pwsh: |
      $env:GIT_REDIRECT_STDERR = '2>&1'

      cd $(Build.SourcesDirectory)/survey-library/
      git checkout -B $(projectsBranch)
      git push origin $(projectsBranch) --follow-tags --no-verify

      cd $(Build.SourcesDirectory)/survey-creator/
      git checkout -B $(projectsBranch)
      git push origin $(projectsBranch) --follow-tags --no-verify

      cd $(Build.SourcesDirectory)/survey-analytics/
      git checkout -B $(projectsBranch)
      git push origin $(projectsBranch) --follow-tags --no-verify

      cd $(Build.SourcesDirectory)/survey-pdf/
      git checkout -B $(projectsBranch)
      git push origin $(projectsBranch) --follow-tags --no-verify

      cd $(Build.SourcesDirectory)/custom-widgets/
      git checkout -B $(projectsBranch)
      git push origin $(projectsBranch) --follow-tags --no-verify
    displayName: 'Push tags'



  # Update Web.config
  - pwsh: |
      $branch = "$(projectsBranch)"

      cd $(Build.SourcesDirectory)/survey-library/packages/survey-core
      $surveyJSVersion = ((npm pkg get version) | Out-String).Trim().Trim('"')
      if ([string]::IsNullOrWhiteSpace($surveyJSVersion)) {
        Write-Error "Failed to read version from survey-core/package.json"
      }
      Write-Host "Resolved SurveyJSVersion=$surveyJSVersion"

      cd $(Build.SourcesDirectory)/service/
      $env:GIT_REDIRECT_STDERR = '2>&1'
      git config --global user.email "surveyjs.org@gmail.com"
      git config --global user.name "surveyjsdeveloper"

      git fetch origin $branch
      git checkout -B $branch origin/$branch
      git reset --hard origin/$branch

      $path = "$(Build.SourcesDirectory)/service/surveyjs.io/Web.config"
      $xml = New-Object System.Xml.XmlDocument
      $xml.PreserveWhitespace = $true
      $xml.Load($path)
      $key = $xml.SelectSingleNode("//appSettings/add[@key = 'SurveyJSVersion']")
      $key.SetAttribute('value', $surveyJSVersion)
      $xml.Save((Resolve-Path $path))

      git add surveyjs.io/Web.config
      if (git status --porcelain) {
          git commit -m "released $surveyJSVersion [azurepipelines skip]"
          git pull origin $branch -X ours --no-rebase
          git push origin $branch
      }
    displayName: 'Update Web.config and push'